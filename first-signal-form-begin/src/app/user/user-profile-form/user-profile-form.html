<div class="card">
  <div class="card-header">
    User Profile
  </div>
  <div class="card-body">
    <form autocomplete="off">
      <div class="row">
        <label class="row-label"
               for="firstNameId">
          First Name
        </label>
        <div class="row-value">
          <input type="text"
                 class="form-control"
                 id="firstNameId"
                 placeholder="First Name" />
        </div>
      </div>

      <div class="row">
        <label class="row-label"
               for="lastNameId">
          Last Name
        </label>
        <div class="row-value">
          <input type="text"
                 class="form-control"
                 id="lastNameId"
                 placeholder="Last Name" />
        </div>
      </div>

      <div class="row">
        <label class="row-label">User Type</label>
        <div class="row-value radio-group">
          <label>
            <input type="radio"
                   class="radio-input"
                   value="employee" />
            Employee
          </label>
          <label>
            <input type="radio"
                   class="radio-input"
                   value="guest" />
            Guest
          </label>
        </div>
      </div>

      <div class="row">
        <div class="row-value">
          <label>
            <input type="checkbox"
                   class="radio-input" />
            Full Time
          </label>
        </div>
      </div>

      <div class="row">
        <label class="row-label"
               for="employeeNumberId">
          Employee #
        </label>
        <div class="row-value">
          <input type="text"
                 class="form-control"
                 id="employeeNumberId"
                 placeholder="Employee Number" />
        </div>
      </div>

      <div class="row">
        <div class="row-value">
          <button type="button"
                  title="Ensure the form is valid and required fields are entered before saving"
                  class="btn btn-primary">
            Save Profile
          </button>
          <button type="button"
                  class="btn btn-secondary">
            Cancel
          </button>
        </div>
      </div>
    </form>
  </div>
</div>
